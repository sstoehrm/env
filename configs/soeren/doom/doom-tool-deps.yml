---
- name: Doom Emacs Tool Dependencies (Soeren)
  hosts: localhost
  vars:
    lsp_booster_version: 'v0.2.1'

  tasks:
    - name: Gather facts
      setup:

    - name: Set user variables
      set_fact:
        user_home: "{{ ansible_facts['env']['HOME'] }}"

    - name: Install tool dependencies (Ubuntu/Debian)
      become: yes
      become_method: sudo
      apt:
        name:
          - shellcheck
          - pandoc
          - libxml2-utils
          - clang-format
        state: present
        update_cache: yes
      when: ansible_facts['os_family'] == "Debian"

    - name: Install tool dependencies (Fedora)
      become: yes
      become_method: sudo
      dnf:
        name:
          - ShellCheck
          - pandoc
          - libxml2
          - clang-tools-extra
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    - name: Check if emacs-lsp-booster is installed
      stat:
        path: "{{ user_home }}/.local/bin/emacs-lsp-booster"
      register: lsp_booster_check

    - name: Install emacs-lsp-booster
      block:
        - name: Ensure .local/bin exists
          file:
            path: "{{ user_home }}/.local/bin"
            state: directory
            mode: '0755'

        - name: Download emacs-lsp-booster
          get_url:
            url: "https://github.com/blahgeek/emacs-lsp-booster/releases/download/{{ lsp_booster_version }}/emacs-lsp-booster_{{ lsp_booster_version }}_x86_64-unknown-linux-musl.zip"
            dest: "/tmp/emacs-lsp-booster.zip"
            mode: '0644'

        - name: Extract emacs-lsp-booster
          unarchive:
            src: /tmp/emacs-lsp-booster.zip
            dest: "{{ user_home }}/.local/bin"
            remote_src: yes

        - name: Clean up
          file:
            path: /tmp/emacs-lsp-booster.zip
            state: absent
      when: not lsp_booster_check.stat.exists

    - name: Install Python tools via pipx
      command: "pipx install {{ item }}"
      loop:
        - grip
        - isort
        - nose
        - black
        - pyflakes
      register: pipx_install
      changed_when: "'installed package' in pipx_install.stdout"
      failed_when: pipx_install.rc != 0 and 'already' not in pipx_install.stdout
