---
- name: Install LSP Servers and Formatters
  hosts: localhost
  vars:
    lsp_base_dir: "{{ ansible_facts['env']['HOME'] }}/lsp"
    clojure_lsp_version: '2026.02.20-16.08.58'
    lua_ls_version: '3.17.1'
    kotlin_lsp_version: '262.2310.0'
    ols_version: 'dev-2026-03'
    zls_version: '0.15.1'
    stylua_version: 'v2.4.0'
    cljfmt_version: '0.16.3'
    ktlint_version: '1.8.0'

  tasks:
    - name: Gather facts
      setup:

    - name: Set user variables
      set_fact:
        user: "{{ ansible_facts['user_id'] }}"
        user_home: "{{ ansible_facts['env']['HOME'] }}"

    - name: Create LSP directories
      file:
        path: "{{ lsp_base_dir }}/{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - bin
        # npm LSP servers
        - typescript-language-server
        - pyright
        - bash-language-server
        - svelte-language-server
        - yaml-language-server
        - json-language-server
        # binary LSP servers
        - clojure-lsp
        - lua-language-server
        - kotlin-lsp
        - ols
        - zls
        - jdtls
        # formatters
        - stylua
        - cljfmt
        - ktlint
        - prettier

    # === npm-based LSP servers ===

    - name: Install typescript-language-server
      shell: npm install --prefix {{ lsp_base_dir }}/typescript-language-server typescript-language-server typescript
      args:
        creates: "{{ lsp_base_dir }}/typescript-language-server/node_modules/.bin/typescript-language-server"

    - name: Symlink typescript-language-server
      file:
        src: "{{ lsp_base_dir }}/typescript-language-server/node_modules/.bin/typescript-language-server"
        dest: "{{ lsp_base_dir }}/bin/typescript-language-server"
        state: link
        force: yes

    - name: Install pyright
      shell: npm install --prefix {{ lsp_base_dir }}/pyright pyright
      args:
        creates: "{{ lsp_base_dir }}/pyright/node_modules/.bin/pyright-langserver"

    - name: Symlink pyright-langserver
      file:
        src: "{{ lsp_base_dir }}/pyright/node_modules/.bin/pyright-langserver"
        dest: "{{ lsp_base_dir }}/bin/pyright-langserver"
        state: link
        force: yes

    - name: Install bash-language-server
      shell: npm install --prefix {{ lsp_base_dir }}/bash-language-server bash-language-server
      args:
        creates: "{{ lsp_base_dir }}/bash-language-server/node_modules/.bin/bash-language-server"

    - name: Symlink bash-language-server
      file:
        src: "{{ lsp_base_dir }}/bash-language-server/node_modules/.bin/bash-language-server"
        dest: "{{ lsp_base_dir }}/bin/bash-language-server"
        state: link
        force: yes

    - name: Install svelte-language-server
      shell: npm install --prefix {{ lsp_base_dir }}/svelte-language-server svelte-language-server
      args:
        creates: "{{ lsp_base_dir }}/svelte-language-server/node_modules/.bin/svelteserver"

    - name: Symlink svelteserver
      file:
        src: "{{ lsp_base_dir }}/svelte-language-server/node_modules/.bin/svelteserver"
        dest: "{{ lsp_base_dir }}/bin/svelteserver"
        state: link
        force: yes

    - name: Install yaml-language-server
      shell: npm install --prefix {{ lsp_base_dir }}/yaml-language-server yaml-language-server
      args:
        creates: "{{ lsp_base_dir }}/yaml-language-server/node_modules/.bin/yaml-language-server"

    - name: Symlink yaml-language-server
      file:
        src: "{{ lsp_base_dir }}/yaml-language-server/node_modules/.bin/yaml-language-server"
        dest: "{{ lsp_base_dir }}/bin/yaml-language-server"
        state: link
        force: yes

    - name: Install vscode-json-language-server
      shell: npm install --prefix {{ lsp_base_dir }}/json-language-server vscode-langservers-extracted
      args:
        creates: "{{ lsp_base_dir }}/json-language-server/node_modules/.bin/vscode-json-language-server"

    - name: Symlink vscode-json-language-server
      file:
        src: "{{ lsp_base_dir }}/json-language-server/node_modules/.bin/vscode-json-language-server"
        dest: "{{ lsp_base_dir }}/bin/vscode-json-language-server"
        state: link
        force: yes

    # === Binary LSP servers ===

    - name: Check if clojure-lsp is installed
      stat:
        path: "{{ lsp_base_dir }}/clojure-lsp/clojure-lsp"
      register: clojure_lsp_check

    - name: Install clojure-lsp
      block:
        - name: Download clojure-lsp
          get_url:
            url: "https://github.com/clojure-lsp/clojure-lsp/releases/download/{{ clojure_lsp_version }}/clojure-lsp-native-linux-amd64.zip"
            dest: "/tmp/clojure-lsp.zip"
            mode: '0644'
        - name: Extract clojure-lsp
          unarchive:
            src: /tmp/clojure-lsp.zip
            dest: "{{ lsp_base_dir }}/clojure-lsp"
            remote_src: yes
        - name: Clean up
          file:
            path: /tmp/clojure-lsp.zip
            state: absent
        - name: Make executable
          file:
            path: "{{ lsp_base_dir }}/clojure-lsp/clojure-lsp"
            mode: '0755'
      when: not clojure_lsp_check.stat.exists

    - name: Symlink clojure-lsp
      file:
        src: "{{ lsp_base_dir }}/clojure-lsp/clojure-lsp"
        dest: "{{ lsp_base_dir }}/bin/clojure-lsp"
        state: link
        force: yes

    - name: Check if lua-language-server is installed
      stat:
        path: "{{ lsp_base_dir }}/lua-language-server/bin/lua-language-server"
      register: lua_ls_check

    - name: Install lua-language-server
      block:
        - name: Download lua-language-server
          get_url:
            url: "https://github.com/LuaLS/lua-language-server/releases/download/{{ lua_ls_version }}/lua-language-server-{{ lua_ls_version }}-linux-x64.tar.gz"
            dest: "/tmp/lua-language-server.tar.gz"
            mode: '0644'
        - name: Extract lua-language-server
          unarchive:
            src: /tmp/lua-language-server.tar.gz
            dest: "{{ lsp_base_dir }}/lua-language-server"
            remote_src: yes
        - name: Clean up
          file:
            path: /tmp/lua-language-server.tar.gz
            state: absent
      when: not lua_ls_check.stat.exists

    - name: Symlink lua-language-server
      file:
        src: "{{ lsp_base_dir }}/lua-language-server/bin/lua-language-server"
        dest: "{{ lsp_base_dir }}/bin/lua-language-server"
        state: link
        force: yes

    - name: Check if kotlin-lsp is installed
      stat:
        path: "{{ lsp_base_dir }}/kotlin-lsp/kotlin-lsp.sh"
      register: kotlin_lsp_check

    - name: Install kotlin-lsp
      block:
        - name: Download kotlin-lsp
          get_url:
            url: "https://download-cdn.jetbrains.com/kotlin-lsp/{{ kotlin_lsp_version }}/kotlin-lsp-{{ kotlin_lsp_version }}-linux-x64.zip"
            dest: "/tmp/kotlin-lsp.zip"
            mode: '0644'
        - name: Extract kotlin-lsp
          unarchive:
            src: /tmp/kotlin-lsp.zip
            dest: "{{ lsp_base_dir }}/kotlin-lsp"
            remote_src: yes
        - name: Clean up
          file:
            path: /tmp/kotlin-lsp.zip
            state: absent
        - name: Make kotlin-lsp.sh executable
          file:
            path: "{{ lsp_base_dir }}/kotlin-lsp/kotlin-lsp.sh"
            mode: '0755'
      when: not kotlin_lsp_check.stat.exists

    - name: Symlink kotlin-lsp
      file:
        src: "{{ lsp_base_dir }}/kotlin-lsp/kotlin-lsp.sh"
        dest: "{{ lsp_base_dir }}/bin/kotlin-lsp"
        state: link
        force: yes

    - name: Check if ols is installed
      stat:
        path: "{{ lsp_base_dir }}/ols/ols-x86_64-unknown-linux-gnu"
      register: ols_check

    - name: Install ols
      block:
        - name: Download ols
          get_url:
            url: "https://github.com/DanielGavin/ols/releases/download/{{ ols_version }}/ols-x86_64-unknown-linux-gnu.zip"
            dest: "/tmp/ols.zip"
            mode: '0644'
        - name: Extract ols
          unarchive:
            src: /tmp/ols.zip
            dest: "{{ lsp_base_dir }}/ols"
            remote_src: yes
        - name: Clean up
          file:
            path: /tmp/ols.zip
            state: absent
      when: not ols_check.stat.exists

    - name: Symlink ols
      file:
        src: "{{ lsp_base_dir }}/ols/ols-x86_64-unknown-linux-gnu"
        dest: "{{ lsp_base_dir }}/bin/ols"
        state: link
        force: yes

    - name: Symlink odinfmt
      file:
        src: "{{ lsp_base_dir }}/ols/odinfmt-x86_64-unknown-linux-gnu"
        dest: "{{ lsp_base_dir }}/bin/odinfmt"
        state: link
        force: yes

    - name: Check if zls is installed
      stat:
        path: "{{ lsp_base_dir }}/zls/zls"
      register: zls_check

    - name: Install zls
      block:
        - name: Download zls
          get_url:
            url: "https://github.com/zigtools/zls/releases/download/{{ zls_version }}/zls-x86_64-linux.tar.xz"
            dest: "/tmp/zls.tar.xz"
            mode: '0644'
        - name: Extract zls
          shell: "tar -xJf /tmp/zls.tar.xz -C {{ lsp_base_dir }}/zls"
        - name: Clean up
          file:
            path: /tmp/zls.tar.xz
            state: absent
      when: not zls_check.stat.exists

    - name: Symlink zls
      file:
        src: "{{ lsp_base_dir }}/zls/zls"
        dest: "{{ lsp_base_dir }}/bin/zls"
        state: link
        force: yes

    - name: Check if jdtls is installed
      stat:
        path: "{{ lsp_base_dir }}/jdtls/bin/jdtls"
      register: jdtls_check

    - name: Install jdtls
      block:
        - name: Download jdtls
          get_url:
            url: "https://download.eclipse.org/jdtls/snapshots/jdt-language-server-latest.tar.gz"
            dest: "/tmp/jdtls.tar.gz"
            mode: '0644'
        - name: Extract jdtls
          unarchive:
            src: /tmp/jdtls.tar.gz
            dest: "{{ lsp_base_dir }}/jdtls"
            remote_src: yes
        - name: Clean up
          file:
            path: /tmp/jdtls.tar.gz
            state: absent
      when: not jdtls_check.stat.exists

    - name: Symlink jdtls
      file:
        src: "{{ lsp_base_dir }}/jdtls/bin/jdtls"
        dest: "{{ lsp_base_dir }}/bin/jdtls"
        state: link
        force: yes

    # === Formatters ===

    - name: Install prettier
      shell: npm install --prefix {{ lsp_base_dir }}/prettier prettier prettier-plugin-svelte
      args:
        creates: "{{ lsp_base_dir }}/prettier/node_modules/.bin/prettier"

    - name: Symlink prettier
      file:
        src: "{{ lsp_base_dir }}/prettier/node_modules/.bin/prettier"
        dest: "{{ lsp_base_dir }}/bin/prettier"
        state: link
        force: yes

    - name: Check if stylua is installed
      stat:
        path: "{{ lsp_base_dir }}/stylua/stylua"
      register: stylua_check

    - name: Install stylua
      block:
        - name: Download stylua
          get_url:
            url: "https://github.com/JohnnyMorganz/StyLua/releases/download/{{ stylua_version }}/stylua-linux-x86_64.zip"
            dest: "/tmp/stylua.zip"
            mode: '0644'
        - name: Extract stylua
          unarchive:
            src: /tmp/stylua.zip
            dest: "{{ lsp_base_dir }}/stylua"
            remote_src: yes
        - name: Clean up
          file:
            path: /tmp/stylua.zip
            state: absent
      when: not stylua_check.stat.exists

    - name: Symlink stylua
      file:
        src: "{{ lsp_base_dir }}/stylua/stylua"
        dest: "{{ lsp_base_dir }}/bin/stylua"
        state: link
        force: yes

    - name: Check if cljfmt is installed
      stat:
        path: "{{ lsp_base_dir }}/cljfmt/cljfmt"
      register: cljfmt_check

    - name: Install cljfmt
      block:
        - name: Download cljfmt
          get_url:
            url: "https://github.com/weavejester/cljfmt/releases/download/{{ cljfmt_version }}/cljfmt-{{ cljfmt_version }}-linux-amd64.tar.gz"
            dest: "/tmp/cljfmt.tar.gz"
            mode: '0644'
        - name: Extract cljfmt
          unarchive:
            src: /tmp/cljfmt.tar.gz
            dest: "{{ lsp_base_dir }}/cljfmt"
            remote_src: yes
        - name: Clean up
          file:
            path: /tmp/cljfmt.tar.gz
            state: absent
      when: not cljfmt_check.stat.exists

    - name: Symlink cljfmt
      file:
        src: "{{ lsp_base_dir }}/cljfmt/cljfmt"
        dest: "{{ lsp_base_dir }}/bin/cljfmt"
        state: link
        force: yes

    - name: Check if ktlint is installed
      stat:
        path: "{{ lsp_base_dir }}/ktlint/ktlint"
      register: ktlint_check

    - name: Install ktlint
      get_url:
        url: "https://github.com/pinterest/ktlint/releases/download/{{ ktlint_version }}/ktlint"
        dest: "{{ lsp_base_dir }}/ktlint/ktlint"
        mode: '0755'
      when: not ktlint_check.stat.exists

    - name: Symlink ktlint
      file:
        src: "{{ lsp_base_dir }}/ktlint/ktlint"
        dest: "{{ lsp_base_dir }}/bin/ktlint"
        state: link
        force: yes

    # === PATH setup ===

    - name: Add LSP bin to PATH in .bashrc
      lineinfile:
        path: "{{ user_home }}/.bashrc"
        line: 'export PATH="$HOME/lsp/bin:$PATH"'
        regexp: 'export PATH=.*\$HOME/lsp/bin'
        state: present
