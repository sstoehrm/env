---
- name: Neovim Dependencies
  hosts: localhost

  tasks:
    - name: Install LazyVim dependencies (Ubuntu/Debian)
      become: yes
      become_method: sudo
      apt:
        name:
          - build-essential
          - ripgrep
          - fzf
          - fish
          - luarocks
          - xclip
          - imagemagick
          - libmagickwand-dev
        state: present
        update_cache: yes
      when: ansible_facts['os_family'] == "Debian"

    - name: Install development tools group (Fedora)
      become: yes
      become_method: sudo
      dnf:
        name: '@Development Tools'
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    - name: Install LazyVim dependencies (Fedora)
      become: yes
      become_method: sudo
      dnf:
        name:
          - ripgrep
          - fzf
          - fish
          - luarocks
          - xclip
          - ImageMagick
          - ImageMagick-devel
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    - name: Install Mermaid CLI (mmdc)
      npm:
        name: "@mermaid-js/mermaid-cli"
        global: yes

    - name: Ensure ~/.local/bin exists
      file:
        path: "{{ ansible_facts['env']['HOME'] }}/.local/bin"
        state: directory
        mode: "0755"

    - name: Install Tectonic (LaTeX)
      shell: curl --proto '=https' --tlsv1.2 -fsSL https://drop-sh.fullyjustified.net | sh
      args:
        chdir: "{{ ansible_facts['env']['HOME'] }}/.local/bin"
        creates: "{{ ansible_facts['env']['HOME'] }}/.local/bin/tectonic"

    - name: Install WezTerm terminfo
      shell: >
        tempfile=$(mktemp) &&
        curl -so "$tempfile" https://raw.githubusercontent.com/wez/wezterm/main/termwiz/data/wezterm.terminfo &&
        tic -x -o {{ ansible_facts['env']['HOME'] }}/.terminfo "$tempfile" &&
        rm "$tempfile"
      args:
        creates: "{{ ansible_facts['env']['HOME'] }}/.terminfo/w/wezterm"
