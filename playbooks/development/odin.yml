---
- name: Odin
  hosts: localhost

  tasks:
    - name: Gather facts
      setup:

    - name: Set user variables
      set_fact:
        user: "{{ ansible_facts['user_id'] }}"
        user_home: "{{ ansible_facts['env']['HOME'] }}"
        local_bin: "{{ ansible_facts['env']['HOME'] }}/.local/bin"
        odin_dir: "{{ ansible_facts['env']['HOME'] }}/.local/odin"

    - name: Ensure directories exist
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ local_bin }}"
        - "{{ odin_dir }}"

    - name: Get installed Odin version
      command: "{{ odin_dir }}/odin version"
      register: odin_installed_version
      changed_when: false
      failed_when: false

    - name: Get latest Odin release version
      uri:
        url: https://api.github.com/repos/odin-lang/Odin/releases/latest
        return_content: yes
      register: odin_release

    - name: Set Odin version facts
      set_fact:
        odin_needs_install: "{{ odin_installed_version.rc != 0 or odin_release.json.tag_name not in (odin_installed_version.stdout | default('')) }}"

    - name: Download latest Odin binary
      get_url:
        url: "https://github.com/odin-lang/Odin/releases/download/{{ odin_release.json.tag_name }}/odin-linux-amd64-{{ odin_release.json.tag_name }}.tar.gz"
        dest: /tmp/odin-latest.tar.gz
      when: odin_needs_install

    - name: Remove old Odin installation
      file:
        path: "{{ odin_dir }}"
        state: absent
      when: odin_needs_install

    - name: Recreate Odin directory
      file:
        path: "{{ odin_dir }}"
        state: directory
        mode: '0755'
      when: odin_needs_install

    - name: Extract Odin
      unarchive:
        src: /tmp/odin-latest.tar.gz
        dest: "{{ odin_dir }}"
        remote_src: yes
        extra_opts: [--strip-components=1]
      when: odin_needs_install

    - name: Symlink odin binary
      file:
        src: "{{ odin_dir }}/odin"
        dest: "{{ local_bin }}/odin"
        state: link
        force: yes

    - name: Clean up downloaded files
      file:
        path: /tmp/odin-latest.tar.gz
        state: absent
      when: odin_needs_install

    - name: Set ODIN_HOME in .bashrc
      lineinfile:
        path: "{{ user_home }}/.bashrc"
        line: 'export ODIN_HOME="{{ odin_dir }}"'
        regexp: 'export ODIN_HOME='
        state: present
